# Services for local dev (used with DDEV or standalone).
# Start: ddev start (or docker compose up -d)
# Backend and workers run via DDEV custom commands or manually.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: podgap
      POSTGRES_PASSWORD: podgap
      POSTGRES_DB: podgap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podgap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Ollama in Docker. Or run on host and set OLLAMA_HOST=http://host.docker.internal:11434
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  pgdata: {}
  ollama_data: {}
